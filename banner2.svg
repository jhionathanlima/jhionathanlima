<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dftGradient">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    text { font-family: 'Segoe UI', Tahoma, sans-serif; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes thermal {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(0.7px, -0.7px); }
    }
    .atom { animation: pulse 3s infinite ease-in-out; }
    .vibrate { animation: thermal 0.15s infinite; }
    
    @media (prefers-color-scheme: dark) { .label-main { fill: #fff; } .arrow { fill: #666; } }
    @media (prefers-color-scheme: light) { .label-main { fill: #222; } .arrow { fill: #ccc; } }
  </style>

  <text x="400" y="35" font-size="18" font-weight="bold" text-anchor="middle" class="label-main">
    COMPUTATIONAL NANOMATERIALS SCIENCE
  </text>

  <!-- BLOCK 1: MD -->
  <g class="vibrate" stroke="#00d4ff" stroke-width="1.5">
    <path fill="none" d="M 80 140 L 100 130 L 120 140 L 120 160 L 100 170 L 80 160 Z M 120 140 L 140 130 L 160 140 L 160 160 L 140 170 L 120 160" opacity="0.6" />
    <g fill="#00d4ff">
      <circle cx="80" cy="140" r="3.5" /><circle cx="100" cy="130" r="3.5" /><circle cx="120" cy="140" r="3.5" /><circle cx="160" cy="160" r="3.5" />
    </g>
  </g>
  <text x="120" y="235" fill="#00d4ff" font-family="monospace" font-size="12" text-anchor="middle">Molecular Dynamics</text>

  <!-- BLOCK 2: DFT -->
  <g>
    <circle cx="360" cy="150" r="35" fill="url(#dftGradient)" />
    <circle cx="360" cy="150" r="12" fill="#ffaa00" class="atom" />
    <text x="360" y="235" fill="#ffaa00" font-family="monospace" font-size="12" text-anchor="middle">Density Functional Theory</text>
  </g>

  <!-- BLOCK 3: ML -->
  <g stroke="#ff66aa" stroke-width="1" opacity="0.5">
    <line x1="580" y1="110" x2="620" y2="100" /><line x1="620" y1="100" x2="670" y2="150" />
    <circle cx="580" cy="110" r="4" fill="#ff66aa" stroke="none" />
    <circle cx="670" cy="150" r="7" fill="#ff66aa" stroke="none" class="atom" />
  </g>
  <text x="625" y="235" fill="#ff66aa" font-family="monospace" font-size="12" text-anchor="middle">Machine Learning</text>

  <text x="250" y="155" class="arrow" font-size="20">≫</text>
  <text x="480" y="155" class="arrow" font-size="20">≫</text>
</svg>

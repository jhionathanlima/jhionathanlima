<svg viewBox="0 0 800 260" xmlns="http://w3.org">
  <!-- TITLE (Neutral gray for Light/Dark mode compatibility) -->
  <text x="400" y="35" fill="#888" font-size="22" font-family="sans-serif" text-anchor="middle">
    Computational Nanomaterials • DFT • MD • ML
  </text>

  <!-- SECTION 1 — NANOMATERIAL + MD -->
  <g id="nano-md">
    <!-- animated atoms -->
    <circle cx="120" cy="120" r="6" fill="#66ccff">
      <animate attributeName="cy" dur="2s" values="120;125;118;120" repeatCount="indefinite"/>
      <animate attributeName="cx" dur="2.5s" values="120;125;118;120" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="160" r="6" fill="#66ccff">
      <animate attributeName="cy" dur="2.2s" values="160;150;165;160" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="160" r="6" fill="#66ccff">
      <animate attributeName="cx" dur="2s" values="70;75;65;70" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="200" r="6" fill="#66ccff">
      <animate attributeName="cy" dur="1.8s" values="200;190;205;200" repeatCount="indefinite"/>
    </circle>

    <!-- shimmering bonds -->
    <line x1="120" y1="120" x2="170" y2="160" stroke="#66ccff66" stroke-width="2">
      <animate attributeName="stroke-opacity" dur="2s" values="0.4;1;0.4" repeatCount="indefinite"/>
    </line>
    <line x1="120" y1="120" x2="70" y2="160" stroke="#66ccff66" stroke-width="2">
      <animate attributeName="stroke-opacity" dur="1.7s" values="0.4;1;0.4" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="160" x2="120" y2="200" stroke="#66ccff66" stroke-width="2">
      <animate attributeName="stroke-opacity" dur="2.3s" values="0.4;1;0.4" repeatCount="indefinite"/>
    </line>
    <line x1="170" y1="160" x2="120" y2="200" stroke="#66ccff66" stroke-width="2">
      <animate attributeName="stroke-opacity" dur="1.9s" values="0.4;1;0.4" repeatCount="indefinite"/>
    </line>

    <text x="120" y="235" fill="#66ccff" font-size="14" font-family="sans-serif" text-anchor="middle">MD • Nanomaterials</text>
  </g>

  <!-- ARROW 1 -->
  <text x="260" y="155" fill="#888" font-size="24">➡</text>

  <!-- SECTION 2 — DFT ELECTRON DENSITY -->
  <g id="dft">
    <circle cx="360" cy="150" r="25" fill="none" stroke="#ffaa00" stroke-width="3">
      <animate attributeName="r" dur="2.2s" values="22;32;24;25" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="150" r="45" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.4">
      <animate attributeName="opacity" dur="3s" values="0.2;0.7;0.2" repeatCount="indefinite"/>
    </circle>
    <text x="360" y="235" fill="#ffaa00" font-size="14" font-family="sans-serif" text-anchor="middle">DFT • Electron Density</text>
  </g>

  <!-- ARROW 2 -->
  <text x="470" y="155" fill="#888" font-size="24">➡</text>

  <!-- SECTION 3 — ML NEURAL NETWORK -->
  <g id="ml">
    <!-- Connections -->
    <g stroke="#ff66aa" stroke-width="1.5" opacity="0.3">
      <line x1="560" y1="110" x2="610" y2="100" />
      <line x1="560" y1="110" x2="610" y2="150" />
      <line x1="560" y1="110" x2="610" y2="200" />
      <line x1="560" y1="190" x2="610" y2="100" />
      <line x1="560" y1="190" x2="610" y2="150" />
      <line x1="560" y1="190" x2="610" y2="200" />
      <line x1="610" y1="100" x2="665" y2="150" />
      <line x1="610" y1="150" x2="665" y2="150" />
      <line x1="610" y1="200" x2="665" y2="150" />
    </g>

    <!-- Nodes -->
    <circle cx="560" cy="110" r="5" fill="#ff66aa" />
    <circle cx="560" cy="190" r="5" fill="#ff66aa" />
    <circle cx="610" cy="100" r="5" fill="#ff66aa"><animate attributeName="opacity" dur="1.5s" values="1;0.3;1" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="150" r="5" fill="#ff66aa"><animate attributeName="opacity" dur="2s" values="1;0.3;1" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="200" r="5" fill="#ff66aa"><animate attributeName="opacity" dur="1.8s" values="1;0.3;1" repeatCount="indefinite"/></circle>
    <circle cx="665" cy="150" r="8" fill="#ff66aa">
      <animate attributeName="r" dur="2s" values="7;10;7" repeatCount="indefinite"/>
    </circle>

    <text x="612" y="235" fill="#ff66aa" font-size="14" font-family="sans-serif" text-anchor="middle">Machine Learning</text>
  </g>
</svg>

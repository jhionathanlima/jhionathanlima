<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <radialGradient id="dftGradient">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    text { font-family: 'Segoe UI', Tahoma, sans-serif; }

    @keyframes thermal {
      0%, 100% { transform: translate(0,0); }
      25% { transform: translate(0.6px, -0.6px); }
      50% { transform: translate(-0.6px, 0.6px); }
      75% { transform: translate(0.6px, 0.6px); }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .vibrate { animation: thermal 0.15s infinite; }
    .blink-node { animation: blink 2s infinite ease-in-out; }

    @media (prefers-color-scheme: dark) { .label-main { fill:#fff; opacity:0.9; } .sep { fill:#666; } }
    @media (prefers-color-scheme: light) { .label-main { fill:#222; } .sep { fill:#aaa; } }
  </style>

  <!-- ========== SECTION 1: DFT (LEFT) ========== -->
  <g id="dft-section" filter="url(#glow)">
    <circle cx="150" cy="150" r="35" fill="url(#dftGradient)" opacity="0.6" />
    <circle cx="150" cy="150" r="12" fill="#ffaa00" />
    <circle cx="150" cy="150" r="45" fill="none" stroke="#ffaa00" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,2" />

    <text x="150" y="235" fill="#ffaa00" font-family="monospace" font-size="12" text-anchor="middle">
      Density Functional Theory
    </text>
  </g>

  <!-- ========== SECTION 2: MOLECULAR DYNAMICS (CENTER) ========== -->
  <g id="md-section" filter="url(#glow)">
    <g class="vibrate" stroke="#00d4ff" stroke-width="1.5">
      <path fill="none"
            d="M 340 140 L 360 130 L 380 140 L 380 160 L 360 170 L 340 160 Z 
               M 380 140 L 400 130 L 420 140 L 420 160 L 400 170 L 380 160
               M 360 170 L 380 180 L 400 170
               M 360 130 L 380 120 L 400 130"
            opacity="0.6" />

      <g fill="#00d4ff">
        <circle cx="340" cy="140" r="3.5" />
        <circle cx="360" cy="130" r="3.5" />
        <circle cx="380" cy="140" r="3.5" />
        <circle cx="380" cy="160" r="3.5" />
        <circle cx="360" cy="170" r="3.5" />
        <circle cx="340" cy="160" r="3.5" />
        <circle cx="400" cy="130" r="3.5" />
        <circle cx="420" cy="140" r="3.5" />
        <circle cx="420" cy="160" r="3.5" />
        <circle cx="400" cy="170" r="3.5" />
        <circle cx="380" cy="180" r="3.5" />
        <circle cx="380" cy="120" r="3.5" />
      </g>
    </g>

    <text x="380" y="235" fill="#00d4ff" font-family="monospace" font-size="12" text-anchor="middle">
      Molecular Dynamics
    </text>
  </g>

  <!-- ========== SECTION 3: MACHINE LEARNING (RIGHT) ========== -->
  <g id="ml-section" filter="url(#glow)">
    <g stroke="#ff66aa" stroke-width="1" opacity="0.3">
      <line x1="580" y1="110" x2="620" y2="100" />
      <line x1="580" y1="110" x2="620" y2="135" />
      <line x1="580" y1="110" x2="620" y2="170" />
      <line x1="580" y1="110" x2="620" y2="205" />

      <line x1="580" y1="190" x2="620" y2="100" />
      <line x1="580" y1="190" x2="620" y2="135" />
      <line x1="580" y1="190" x2="620" y2="170" />
      <line x1="580" y1="190" x2="620" y2="205" />

      <line x1="620" y1="100" x2="670" y2="150" />
      <line x1="620" y1="135" x2="670" y2="150" />
      <line x1="620" y1="170" x2="670" y2="150" />
      <line x1="620" y1="205" x2="670" y2="150" />
    </g>

    <g class="blink-node">
      <circle cx="580" cy="110" r="4" fill="#ff66aa" />
      <circle cx="580" cy="190" r="4" fill="#ff66aa" />
      <circle cx="620" cy="100" r="3" fill="#fff" />
      <circle cx="620" cy="135" r="3" fill="#fff" />
      <circle cx="620" cy="170" r="3" fill="#fff" />
      <circle cx="620" cy="205" r="3" fill="#fff" />
      <circle cx="670" cy="150" r="7" fill="#ff66aa" />
    </g>

    <text x="625" y="235" fill="#ff66aa" font-family="monospace" font-size="12" text-anchor="middle">
      Machine Learning
    </text>
  </g>

</svg>

<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Estilos globais e animações */
    text { font-family: sans-serif; }
    .fade-shimmer { animation: shimmer 2s infinite; }
    .pulse { animation: pulse-node 2s infinite ease-in-out; }
    .float { animation: float-atom 3s infinite ease-in-out; }

    @keyframes shimmer {
      0%, 100% { stroke-opacity: 0.3; }
      50% { stroke-opacity: 1; }
    }
    @keyframes pulse-node {
      0%, 100% { r: 5; opacity: 0.4; }
      50% { r: 8; opacity: 1; }
    }
    @keyframes float-atom {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(5px, -5px); }
    }
    
    /* Adaptar cores ao tema do GitHub */
    @media (prefers-color-scheme: dark) {
      .text-main { fill: #ffffffaa; }
      .arrow { fill: #ffffff55; }
    }
    @media (prefers-color-scheme: light) {
      .text-main { fill: #333; }
      .arrow { fill: #ccc; }
    }
  </style>

  <!-- TITLE -->
  <text x="400" y="35" font-size="22" text-anchor="middle" class="text-main">
    Computational Nanomaterials • DFT • MD • ML
  </text>

  <!-- SECTION 1 — MD -->
  <g id="nano-md">
    <g class="float">
        <circle cx="120" cy="120" r="6" fill="#66ccff" />
        <circle cx="170" cy="160" r="6" fill="#66ccff" />
        <circle cx="70" cy="160" r="6" fill="#66ccff" />
        <circle cx="120" cy="200" r="6" fill="#66ccff" />
        <line x1="120" y1="120" x2="170" y2="160" stroke="#66ccff" stroke-width="2" class="fade-shimmer" />
        <line x1="120" y1="120" x2="70" y2="160" stroke="#66ccff" stroke-width="2" class="fade-shimmer" />
        <line x1="70" y1="160" x2="120" y2="200" stroke="#66ccff" stroke-width="2" class="fade-shimmer" />
        <line x1="170" y1="160" x2="120" y2="200" stroke="#66ccff" stroke-width="2" class="fade-shimmer" />
    </g>
    <text x="120" y="235" fill="#66ccff" font-size="14" text-anchor="middle">MD • Nanomaterials</text>
  </g>

  <text x="260" y="155" font-size="24" class="arrow">➡</text>

  <!-- SECTION 2 — DFT -->
  <g id="dft">
    <circle cx="360" cy="150" r="25" fill="none" stroke="#ffaa00" stroke-width="3">
      <animate attributeName="r" dur="2s" values="20;30;20" repeatCount="indefinite" />
    </circle>
    <text x="360" y="235" fill="#ffaa00" font-size="14" text-anchor="middle">DFT • Electron Density</text>
  </g>

  <text x="470" y="155" font-size="24" class="arrow">➡</text>

  <!-- SECTION 3 — ML NEURAL NETWORK -->
  <g id="ml">
    <g stroke="#ff66aa" stroke-width="1" opacity="0.2">
      <line x1="560" y1="110" x2="610" y2="100" /><line x1="560" y1="110" x2="610" y2="150" /><line x1="560" y1="110" x2="610" y2="200" />
      <line x1="560" y1="190" x2="610" y2="100" /><line x1="560" y1="190" x2="610" y2="150" /><line x1="560" y1="190" x2="610" y2="200" />
      <line x1="610" y1="100" x2="665" y2="150" /><line x1="610" y1="150" x2="665" y2="150" /><line x1="610" y1="200" x2="665" y2="150" />
    </g>
    <circle cx="560" cy="110" r="5" fill="#ff66aa" />
    <circle cx="560" cy="190" r="5" fill="#ff66aa" />
    <circle cx="610" cy="100" r="5" fill="#ff66aa" class="pulse" />
    <circle cx="610" cy="150" r="5" fill="#ff66aa" class="pulse" style="animation-delay: 0.5s" />
    <circle cx="610" cy="200" r="5" fill="#ff66aa" class="pulse" style="animation-delay: 1s" />
    <circle cx="665" cy="150" r="8" fill="#ff66aa" />
    <text x="612" y="235" fill="#ff66aa" font-size="14" text-anchor="middle">Machine Learning</text>
  </g>
</svg>
